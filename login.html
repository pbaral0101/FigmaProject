<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Novara Resort</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Login Page ── -->
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <h1>Novara<span>.</span></h1>
      <p>Luxury Resort &amp; Spa</p>
    </div>

    <h2>Welcome Back</h2>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
        Sign In
      </button>
    </form>

    <p class="text-center mt-4" style="font-size:.85rem;color:#9AABB8;">
      Not a member?
      <a href="home.html" style="color:var(--teal);font-weight:700;">Explore the resort</a>
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
